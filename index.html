<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flincho AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:40px 20px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

p{
    font-size:20px;
    color:#cbd5e1;
    margin-bottom:30px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:15px 35px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.features{
    margin-top:50px;
    display:grid;
    gap:20px;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    font-size:20px;
}
</style>

</head>

<body>

<h1>🚀 Flincho AI</h1>

<p>Write. Create. Grow.</p>

<button>Get Started Free</button>

<div class="features">

</div>

<div class="card">
🎨 AI Image Generator
</div>

<div class="card">
📱 Social Media Assistant
</div>

<div class="card">

</div>

</div>

</html>
